<header class="site-header">
  <div class="header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <span class="brand-mark">●</span>
      <span class="brand-name">R1MX</span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-list">
        {% for item in site.nav %}
        <li class="nav-item">
          <a class="nav-link{% if page.url == item.url %} active{% endif %}"
             href="{{ item.url | relative_url }}">{{ item.title }}</a>
        </li>
        {% endfor %}
        <li class="nav-item nav-github">
          <a class="nav-link nav-link--github" href="https://github.com/simukka/r1mx" target="_blank" rel="noopener">
            GitHub ↗
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>
<script>
  (function() {
    var btn = document.querySelector('.nav-toggle');
    var nav = document.querySelector('.nav-list');
    if (btn && nav) {
      btn.addEventListener('click', function() {
        var expanded = btn.getAttribute('aria-expanded') === 'true';
        btn.setAttribute('aria-expanded', String(!expanded));
        nav.classList.toggle('nav-list--open');
      });
    }
  })();
</script>
